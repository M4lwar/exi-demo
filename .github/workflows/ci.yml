name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  EXIFICIENT_VERSION: "1.0.1"

jobs:
  linux:
    name: build-linux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install Conan
        run: pip install "conan>=2.0"
      - name: Restore baked uci-2.5.0 exificient package
        run: |
          curl -fsSL -o exi-baked.tgz \
            "https://github.com/M4lwar/exi-bake-template/releases/download/v1.0.1-uci-2.5.0/conan-exificient-1.0.1+uci-2.5.0-linux-${{ matrix.arch }}.tgz"
          conan profile detect --force
          conan cache restore exi-baked.tgz
      - name: Build
        run: |
          conan install . -o "exificient/*:baked_schema=uci-2.5.0"
          cmake -S . -B build/Release \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/build/Release/generators/conan_toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/Release
      - name: Run
        run: |
          ./build/Release/exi-demo -h
          ./build/Release/exi-demo create-cost
          ./build/Release/exi-demo bench samples/
          ./build/Release/exi-demo peek samples/
          ./build/Release/exi-demo headers samples/position-report.xml
          ./build/Release/exi-demo errors
          ./build/Release/exi-demo threads -t 4 -n 100
          ./build/Release/exi-demo options docs/options/byte-aligned.xml samples/
          ./build/Release/exi-demo options docs/options/compression-fragment.xml samples/
          ./build/Release/exi-demo tune samples/
          test "$(./build/Release/exi-demo uuid v5 dns www.example.com)" = "2ed6657d-e927-568b-95e1-2665a8aea6a2"
          test "$(./build/Release/exi-demo uuid v3 dns www.example.com)" = "5df41881-3aed-3515-88a7-2f4a814cf09e"

  windows:
    name: build-windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install Conan
        run: pip install "conan>=2.0"
      - name: Restore baked uci-2.5.0 exificient package
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/M4lwar/exi-bake-template/releases/download/v1.0.1-uci-2.5.0/conan-exificient-1.0.1+uci-2.5.0-windows-x86_64.tgz" -OutFile exi.tgz
          conan profile detect --force
          conan cache restore exi.tgz
      - name: Build
        shell: pwsh
        run: |
          conan install . -o "exificient/*:baked_schema=uci-2.5.0"
          # CMAKE_TOOLCHAIN_FILE must be ABSOLUTE — a relative path is resolved
          # against the build dir, not CWD.
          $tc = (Get-ChildItem -Recurse -Filter conan_toolchain.cmake build | Select-Object -First 1).FullName
          cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$tc"
          cmake --build build --config Release
      - name: Run
        shell: cmd
        run: |
          build\Release\exi-demo.exe -h || exit /b 1
          build\Release\exi-demo.exe create-cost || exit /b 1
          build\Release\exi-demo.exe bench samples\ || exit /b 1
          build\Release\exi-demo.exe peek samples\ || exit /b 1
          build\Release\exi-demo.exe headers samples\position-report.xml || exit /b 1
          build\Release\exi-demo.exe errors || exit /b 1
          build\Release\exi-demo.exe threads -t 4 -n 100 || exit /b 1
          build\Release\exi-demo.exe options docs\options\byte-aligned.xml samples\ || exit /b 1
          build\Release\exi-demo.exe options docs\options\compression-fragment.xml samples\ || exit /b 1
          build\Release\exi-demo.exe tune samples\ || exit /b 1
          for /f "delims=" %%u in ('build\Release\exi-demo.exe uuid v5 dns www.example.com') do set UUID_V5=%%u
          if not "%UUID_V5%"=="2ed6657d-e927-568b-95e1-2665a8aea6a2" exit /b 1
          for /f "delims=" %%u in ('build\Release\exi-demo.exe uuid v3 dns www.example.com') do set UUID_V3=%%u
          if not "%UUID_V3%"=="5df41881-3aed-3515-88a7-2f4a814cf09e" exit /b 1
